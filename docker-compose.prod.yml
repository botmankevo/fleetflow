version: '3.8'

services:
  db:
    image: postgres:15
    container_name: main-tms-db-prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-main_tms}
      POSTGRES_USER: ${POSTGRES_USER:-main_tms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - main_tms_pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: main-tms-backend-prod
    restart: always
    environment:
      FLEETFLOW_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      ENABLE_MAPBOX: ${ENABLE_MAPBOX:-true}
      MAPBOX_API_KEY: ${MAPBOX_API_KEY}
      FMCSA_API_KEY: ${FMCSA_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE}
    container_name: main-tms-frontend-prod
    restart: always
    ports:
      - "80:3000"
    depends_on:
      - backend

volumes:
  main_tms_pgdata_prod:
